version: '3.8'

services:
  # Backend Node.js MediSENA
  medisena-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisena-backend
    ports:
      - "8081:8081"
    environment:
      NODE_ENV: production
      ORACLE_USERNAME: ${ORACLE_USERNAME}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_URL: ${ORACLE_URL}
    networks:
      - medisena-network

  # Frontend React MediSENA
  medisena-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: medisena-frontend
    ports:
      - "8080:80"
    depends_on:
      - medisena-backend
    networks:
      - medisena-network

  # Redis para caché
  medisena-redis:
    image: redis:6.2-alpine
    container_name: medisena-redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - medisena-network

networks:
  medisena-network:
    name: medisena-network

volumes:
  redis_data:
    driver: local
